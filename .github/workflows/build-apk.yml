name: Build Kimi K2.6 UDE APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      id: setup-java
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Capacitor dependencies
      run: npm install

    - name: Add Android platform
      run: |
        npx cap add android
        npx cap copy android
        npx cap sync android

    - name: Patch Android project
      run: |
        BUILD_GRADLE="android/app/build.gradle"

        # Add NDK abiFilters to defaultConfig
        sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a", "armeabi-v7a", "x86_64", "x86" }' "$BUILD_GRADLE"

        # Add aaptOptions before the closing brace of android {}
        sed -i '/^android {/a\    aaptOptions { noCompress "js", "css", "html", "map", "json", "wasm" }' "$BUILD_GRADLE"

        # Add usesCleartextTraffic to manifest
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's|android:usesCleartextTraffic="false"|android:usesCleartextTraffic="true"|g' "$MANIFEST"

        # Remove extractNativeLibs if present
        sed -i '/android:extractNativeLibs/d' "$MANIFEST"

        echo "=== Patched build.gradle ==="
        cat "$BUILD_GRADLE"
        echo ""
        echo "=== Patched manifest ==="
        cat "$MANIFEST"

    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.path }}

    - name: Verify APK
      run: |
        APK_FILE=$(find android -name "app-debug.apk" -type f | head -1)
        if [ -z "$APK_FILE" ]; then
          echo "❌ No APK found!"
          exit 1
        fi
        echo "APK: $APK_FILE"
        echo "APK Size: $(du -h "$APK_FILE" | cut -f1)"
        echo ""
        echo "=== Native Libraries ==="
        unzip -l "$APK_FILE" | grep "lib/" || echo "No native libs"
        echo ""
        echo "=== Assets (first 15) ==="
        unzip -l "$APK_FILE" | grep "assets/" | head -15
        echo ""
        echo "=== Signature Files ==="
        unzip -l "$APK_FILE" | grep -E "META-INF/.*\.(RSA|SF|MF)" || echo "No signature found"
        echo ""
        echo "=== Total files ==="
        unzip -l "$APK_FILE" | tail -1

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: kimi-ude-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Build Summary
      if: always()
      run: |
        APK_FILE=$(find android -name "app-debug.apk" -type f 2>/dev/null | head -1)
        if [ -n "$APK_FILE" ]; then
          APK_SIZE=$(du -h "$APK_FILE" | cut -f1)
          echo "### ✅ APK Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "📱 Size: $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "🏗️ Built with: Capacitor 6 + Android SDK 34" >> $GITHUB_STEP_SUMMARY
          echo "🧠 Features: Kimi K2.6 AI + Code Editor + Terminal" >> $GITHUB_STEP_SUMMARY
          echo "📦 Download from Artifacts section below" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ APK Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the build logs for errors" >> $GITHUB_STEP_SUMMARY
        fi
